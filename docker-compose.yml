# Orion stack: Postgres, Redis, FastAPI backend, Next.js frontend.
#
# Works without a `.env` file (defaults are inlined). To customize, copy
# `.env.example` to `.env` and run: `docker compose --env-file .env up --build`

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orion}
      POSTGRES_DB: ${POSTGRES_DB:-orion}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      APP_ENV: ${APP_ENV:-}
      DEBUG: ${DEBUG:-true}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-long-random-string}
      TRADING_ENABLED: ${TRADING_ENABLED:-true}
      MAX_OPEN_POSITIONS: ${MAX_OPEN_POSITIONS:-20}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-orion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orion}
      POSTGRES_DB: ${POSTGRES_DB:-orion}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-orion}:${POSTGRES_PASSWORD:-orion}@postgres:5432/${POSTGRES_DB:-orion}
      ALPACA_API_KEY_ID: ${ALPACA_API_KEY_ID:-}
      ALPACA_API_SECRET_KEY: ${ALPACA_API_SECRET_KEY:-}
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:-}
      ALPACA_PAPER_BASE_URL: ${ALPACA_PAPER_BASE_URL:-https://paper-api.alpaca.markets}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_ORIGIN: http://backend:8000
    restart: unless-stopped
    environment:
      BACKEND_ORIGIN: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

  rq-worker:
    profiles: [workers]
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["rq", "worker", "--url", "redis://redis:6379/0", "default"]
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      DEBUG: ${DEBUG:-true}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-long-random-string}
      TRADING_ENABLED: ${TRADING_ENABLED:-true}
      MAX_OPEN_POSITIONS: ${MAX_OPEN_POSITIONS:-20}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-orion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orion}
      POSTGRES_DB: ${POSTGRES_DB:-orion}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-orion}:${POSTGRES_PASSWORD:-orion}@postgres:5432/${POSTGRES_DB:-orion}
      ALPACA_API_KEY_ID: ${ALPACA_API_KEY_ID:-}
      ALPACA_API_SECRET_KEY: ${ALPACA_API_SECRET_KEY:-}
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:-}
      ALPACA_PAPER_BASE_URL: ${ALPACA_PAPER_BASE_URL:-https://paper-api.alpaca.markets}
      SKIP_DB_MIGRATIONS: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  position-monitor-scheduler:
    profiles: [workers]
    build:
      context: ./backend
      dockerfile: Dockerfile
    command:
      - sh
      - -c
      - "while true; do python -m app.tasks.enqueue_position_monitor; sleep 60; done"
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      DEBUG: ${DEBUG:-true}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-long-random-string}
      TRADING_ENABLED: ${TRADING_ENABLED:-true}
      MAX_OPEN_POSITIONS: ${MAX_OPEN_POSITIONS:-20}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-orion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orion}
      POSTGRES_DB: ${POSTGRES_DB:-orion}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-orion}:${POSTGRES_PASSWORD:-orion}@postgres:5432/${POSTGRES_DB:-orion}
      ALPACA_API_KEY_ID: ${ALPACA_API_KEY_ID:-}
      ALPACA_API_SECRET_KEY: ${ALPACA_API_SECRET_KEY:-}
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:-}
      ALPACA_PAPER_BASE_URL: ${ALPACA_PAPER_BASE_URL:-https://paper-api.alpaca.markets}
      SKIP_DB_MIGRATIONS: "1"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  pgdata: {}
