# Alembic configuration — run migrations from the `backend/` directory:
#   alembic upgrade head

[alembic]
script_location = alembic
prepend_sys_path = .
version_path = alembic/versions

# Overridden at runtime in `alembic/env.py` from application settings.
sqlalchemy.url = postgresql+psycopg2://orion:orion@localhost:5432/orion

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
